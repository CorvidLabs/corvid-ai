# Dogfoods fledge for the dev loop. fledge is a CLI dev tool here, NOT a Cargo
# dependency. corvid-ai stays a dependency-free leaf crate.

[tasks.build]
cmd = "cargo build"
description = "Build the crate"

[tasks.test]
cmd = "cargo test"
description = "Run the test suite"

[tasks.lint]
cmd = "cargo clippy --all-targets -- -D warnings"
description = "Clippy with warnings denied"

[tasks.fmt]
cmd = "cargo fmt --check"
description = "Check formatting"

[tasks.ci]
cmd = "cargo test"
deps = ["fmt", "lint"]
description = "Full local gate: fmt + lint + test"

[release]
files = ["Cargo.toml"]
